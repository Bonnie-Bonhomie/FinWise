name: fin_wise
description: "Finance management mobile app"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter

  dio: ^5.7.0
  get: ^4.7.2
  fluttertoast: ^8.2.14
  fl_chart: ^0.71.0
  table_calendar: ^3.2.0
  image_picker: ^1.2.0
  intl: ^0.20.2
  internet_connection_checker: ^3.0.1
  pin_code_fields: ^8.0.1
  local_auth: ^2.3.0  #For Fingerprint authentication #set the MainActivity
  flutter_secure_storage: ^9.2.4
  lottie: ^3.1.3
  shimmer: ^3.0.0  #for skeleton loading_animations
  cached_network_image: ^3.4.1
  google_fonts: ^6.3.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.8.0


  share_plus: ^10.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.1
  pdf: ^3.11.3
  printing: ^5.14.0


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
#  awesome_notifications: ^0.10.1
  device_info_plus: ^10.1.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/white_d.png"
  remove_alpha_ios: true

  adaptive_icon_background: "#00d09e"
  adaptive_icon_foreground: "assets/logos/white_d.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/green_icon.png
  color_dark: "#121212"
  image_dark: assets/green_icon.png


  android_12:
    image: assets/green_icon.png
    image_dark: assets/green_icon.png


flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true


  assets:
    - assets/logos/
    - assets/fonts/
    - assets/images/
    - assets/productLogo/
    - assets/animations/Success.json


  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Italic.ttf

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
